name: Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: CalcPaper ${{ github.ref_name }}
        body: |
          ## CalcPaper ${{ github.ref_name }}

          Smart Calculator for Programmers / 程序员的智能计算稿纸

          ### 📥 Download / 下载
          - **Windows**: `CalcPaper.exe` — Double-click to run / 双击运行
          - **macOS**: `CalcPaper.dmg` — Open DMG to run / 打开 DMG 运行
          - **Linux**: `CalcPaper` — `chmod +x CalcPaper && ./CalcPaper`

          💡 Supports both GUI and CLI modes / 支持 GUI 和 CLI 双模式:
          - GUI (default): `CalcPaper`
          - CLI: `CalcPaper --cli`

          ### 🆕 New in v2.1 / v2.1 新功能
          - 📆 workday() working day calculation / 工作日计算函数
            - Auto-skip weekends / 自动跳过周末
            - Custom holidays: `workday(Y20260411, 10, Y20260501/-Y20260412)`
          - 📝 Smart date/time comments / 智能日期时间注释
            - Date: 2026年4月11日 第15周星期六 / 2026-04-11 W15 Sat
            - Time: 9时30分 / 09:30:00
            - Duration: 3月1周2天 / 3mo1w2d, 8小时30分钟 / 8h30m
          - 🔗 hex(swap()) nested function support / 嵌套函数支持
          - 🛠️ Fix Ctrl+Enter inserting newline in GUI / 修复 Ctrl+Enter 换行问题

          ### 🆕 From v2.0 / v2.0 功能
          - 📅 Date & time arithmetic / 日期时间加减运算 (Y/T/M/W/D/h/m/s)
          - ✏️ Variable name autocomplete / 变量名自动补全
          - 🔄 Auto update check on startup / 启动时自动检查更新
          - 🖥️ Packaged exe supports CLI mode / 打包程序支持 CLI 模式

          ### ✅ All Features / 全部功能
          - 🧮 Variable references / 变量引用
          - 🔢 Hex & Binary support / 16进制/2进制
          - ⚡ Bitwise operations / 位运算 (<<, >>, &, |, ^, ~)
          - 📊 bitmap() bit visualization / 位结构可视化
          - 🔀 swap() byte order swap / 字节序交换
          - 🔢 hex() hex display / 16进制显示 (supports nesting / 支持嵌套)
          - 📅 Date & time arithmetic / 日期时间运算
          - 📆 workday() working day calculation / 工作日计算
          - 💯 Percentage calculation / 百分数计算
          - ✏️ Variable autocomplete / 变量自动补全
          - 🔄 Auto update check / 自动检查更新
          - 💾 Session auto-restore / 会话自动恢复
          - ⚙️ Config persistence / 配置持久化
          - ⌨️ Customizable shortcuts / 可自定义快捷键
          - 🌏 Bilingual (EN/ZH) / 中英文双语
          - 🔤 Font scaling / 字体缩放
          - 🔄 Undo & Redo / 撤销恢复

          Documentation / 文档: [README.md](https://github.com/${{ github.repository }})
        draft: false
        prerelease: false

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Build
      run: |
        pip install pyinstaller
        pyinstaller --onefile --windowed --name=CalcPaper --icon=calcpaper.ico --add-data "calcpaper.ico;." main.py
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/CalcPaper.exe

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Build
      run: |
        pip install pyinstaller
        pyinstaller --onefile --windowed --name=CalcPaper --add-data "calcpaper.ico:." main.py
        # onefile mode generates a single executable, not a .app bundle
        # Create DMG containing the executable
        mkdir dmg_temp
        cp dist/CalcPaper dmg_temp/
        hdiutil create -volname "CalcPaper" -srcfolder dmg_temp -ov -format UDZO CalcPaper.dmg
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: CalcPaper.dmg

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Build
      run: |
        pip install pyinstaller
        pyinstaller --onefile --windowed --name=CalcPaper --add-data "calcpaper.ico:." main.py
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/CalcPaper